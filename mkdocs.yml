site_name: Gasket Gateway
site_description: An API gateway for OpenAI-compliant inference backends with enterprise capabilities
repo_url: https://github.com/Gasket-Gateway/docs
repo_name: Gasket-Gateway/docs
edit_uri: ""

theme:
  name: material
  logo: assets/img/logo.svg
  favicon: assets/img/logo.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Architecture: architecture.md
  - UI Demo: demo.md
  - Configuration Reference: configuration.md
  - Portal & Gateway: portal-and-gateway.md
  - Development & Testing: development.md
  - Deployment: deployment.md
  - Security: security.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_javascript:
  - javascripts/extra.js
